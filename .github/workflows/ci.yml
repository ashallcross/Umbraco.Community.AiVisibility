# CI build matrix: online + offline.
#
# The package's MSBuild pipeline fetches the AI-crawler list from upstream
# (ai-robots-txt/ai.robots.txt) at build time and verifies the SHA against a
# pinned constant in `Umbraco.Community.AiVisibility/Umbraco.Community.AiVisibility.csproj`. To exercise both
# code paths, this workflow runs two independent jobs:
#
#   - build-online   — network reachable; expects the SHA-pinned fetch to
#                      succeed and the assembly to embed the upstream content.
#   - build-offline  — egress blocked; expects the build to fall back to the
#                      committed `HealthChecks/AiBotList.fallback.txt` and emit
#                      the offline-safe warning.
#
# Both jobs run the full test suite. If either fails, the PR is blocked.
#
# SHA refresh is a maintainer action only (PR review). Do NOT add a scheduled
# job that auto-bumps the pinned SHA — that defeats the protection
# (see docs/maintenance.md).

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  DOTNET_NOLOGO: '1'
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'

jobs:
  build-online:
    name: Build + test (online — fetches AI-bot list from upstream)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.1'

      - name: npm ci (Backoffice TS)
        run: npm ci
        working-directory: Umbraco.Community.AiVisibility/Client

      - name: npm run build (Backoffice TS)
        run: npm run build
        working-directory: Umbraco.Community.AiVisibility/Client

      - name: Assert Vite bundle materialised
        run: |
          set -euo pipefail
          BUNDLE=Umbraco.Community.AiVisibility/wwwroot/App_Plugins/UmbracoCommunityAiVisibility/umbraco-community-aivisibility.js
          PKG_MANIFEST=Umbraco.Community.AiVisibility/Client/public/umbraco-package.json
          if [[ ! -f "${BUNDLE}" ]]; then
            echo "::error::Vite entry bundle missing at ${BUNDLE} after 'npm run build'. The Backoffice JS will not load — adopters' dashboards will fail to register."
            exit 1
          fi
          if [[ ! -f "${PKG_MANIFEST}" ]]; then
            echo "::error::Umbraco package manifest missing at ${PKG_MANIFEST} — Backoffice extension manifests will not register."
            exit 1
          fi
          echo "Vite bundle and Umbraco package manifest present."

      - name: dotnet restore
        run: dotnet restore Umbraco.Community.AiVisibility.slnx

      - name: dotnet build (Release)
        run: |
          set -euo pipefail
          # Capture stdout so we can assert the online-path log line is present.
          dotnet build Umbraco.Community.AiVisibility.slnx --configuration Release --no-restore | tee build-online.log
          if ! grep -q "AI bot list synced from upstream" build-online.log; then
            echo "::error::Online build did not emit the expected SHA-synced message — fetch path may be broken or skipped."
            exit 1
          fi

      # dependency vulnerability release gate. Compares
      # de-duped NU1902/NU1903 warning lines against the catalogued allow-list
      # at .github/expected-vuln-warnings.txt. The matcher is exact-line
      # equality (`comm -23`): each captured warning's canonical
      # `NUxxxx: Package '<name>' <version>` substring must appear verbatim
      # in the allow-list, otherwise the build fails. See
      # `docs/dependency-status.md` for the per-warning narrative + target
      # review dates.
      - name: Assert no unexpected NU1902/NU1903 vulnerability warnings
        run: |
          set -euo pipefail
          EXPECTED_FILE=.github/expected-vuln-warnings.txt
          if [[ ! -f "${EXPECTED_FILE}" ]]; then
            echo "::error::Vuln allow-list missing at ${EXPECTED_FILE}"
            exit 1
          fi
          # The previous `dotnet build` step pipes its full output into
          # `build-online.log` via `tee`. If that file is missing or empty,
          # ACTUAL would silently be empty and the gate would PASS even
          # though no input was scanned — so fail loudly here instead.
          if [[ ! -s build-online.log ]]; then
            echo "::error::build-online.log missing or empty — vuln gate cannot run."
            echo "Did the preceding 'dotnet build (Release)' step change its `tee` redirection?"
            exit 1
          fi
          # Extract the canonical "NU190x: Package '<name>' <version>" substring
          # from each warning line, de-dup, sort. `grep` exits 1 on no-match
          # under `pipefail`; tolerate exit 1 only and let other failures
          # propagate (rather than the catch-all `|| true`).
          ACTUAL=$(grep -Eo "NU190[23]: Package '[^']+' [^ ]+" build-online.log | sort -u || { rc=$?; [[ "${rc}" -eq 1 ]] || exit "${rc}"; })
          EXPECTED=$(grep -Ev '^[[:space:]]*(#|$)' "${EXPECTED_FILE}" | sort -u)
          UNEXPECTED=$(comm -23 <(echo "${ACTUAL}") <(echo "${EXPECTED}") | grep -v '^$' || { rc=$?; [[ "${rc}" -eq 1 ]] || exit "${rc}"; })
          if [[ -n "${UNEXPECTED}" ]]; then
            echo "::error::Unexpected vulnerability warning(s) — not in ${EXPECTED_FILE}:"
            echo "${UNEXPECTED}" | sed 's/^/  - /'
            echo ""
            echo "Either update the allow-list (legitimate new vuln, document in docs/dependency-status.md)"
            echo "or fix the underlying dependency (preferred — bump the transitive root)."
            exit 1
          fi
          STALE=$(comm -13 <(echo "${ACTUAL}") <(echo "${EXPECTED}") | grep -v '^$' || { rc=$?; [[ "${rc}" -eq 1 ]] || exit "${rc}"; })
          if [[ -n "${STALE}" ]]; then
            echo "::warning::Allow-list entries no longer fire (consider pruning):"
            echo "${STALE}" | sed 's/^/  - /'
          fi

      - name: dotnet test (Release, excludes LaunchSmoke)
        run: dotnet test Umbraco.Community.AiVisibility.slnx --configuration Release --no-build --verbosity normal --filter "Category!=LaunchSmoke"

      # launch-readiness smoke trio gate. Three integration
      # tests boot the TestSite via WebApplicationFactory<Program> and assert
      # the package's most load-bearing routes against seeded Clean.Core 7.0.5
      # content (per-page Markdown frontmatter, HTML pipeline unaltered, ETag
      # 304 revalidation). Separate step so a smoke-trio-only failure surfaces
      # distinctly from generic test regressions.
      - name: dotnet test (Release, LaunchSmoke gate only)
        run: dotnet test Umbraco.Community.AiVisibility.slnx --configuration Release --no-build --verbosity normal --filter "Category=LaunchSmoke"

  build-offline:
    name: Build + test (offline — falls back to committed snapshot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.1'

      - name: npm ci (Backoffice TS, online — TypeScript build is a separate concern)
        run: npm ci
        working-directory: Umbraco.Community.AiVisibility/Client

      - name: npm run build (Backoffice TS)
        run: npm run build
        working-directory: Umbraco.Community.AiVisibility/Client

      - name: Assert Vite bundle materialised
        run: |
          set -euo pipefail
          BUNDLE=Umbraco.Community.AiVisibility/wwwroot/App_Plugins/UmbracoCommunityAiVisibility/umbraco-community-aivisibility.js
          PKG_MANIFEST=Umbraco.Community.AiVisibility/Client/public/umbraco-package.json
          if [[ ! -f "${BUNDLE}" ]]; then
            echo "::error::Vite entry bundle missing at ${BUNDLE} after 'npm run build' (offline lane). The Backoffice JS will not load."
            exit 1
          fi
          if [[ ! -f "${PKG_MANIFEST}" ]]; then
            echo "::error::Umbraco package manifest missing at ${PKG_MANIFEST} (offline lane)."
            exit 1
          fi
          echo "Vite bundle and Umbraco package manifest present (offline lane)."

      - name: dotnet restore
        run: dotnet restore Umbraco.Community.AiVisibility.slnx

      # Override the source URL so the MSBuild fetch fails deterministically
      # (no network access required — :65535 is reserved port-zero shape that
      # never resolves to a listener). This is cleaner than blocking egress at
      # the runner level and keeps the offline test path verifiable on any CI.
      - name: dotnet build (Release, offline simulated via unreachable AI-bot URL)
        run: |
          set -euo pipefail
          dotnet build Umbraco.Community.AiVisibility.slnx \
            --configuration Release \
            --no-restore \
            "/p:AiBotListSourceUrl=http://localhost:65535/unreachable.txt" \
            | tee build-offline.log
          if ! grep -q "Falling back to AiBotList.fallback.txt" build-offline.log; then
            echo "::error::Offline build did not emit the expected fallback warning — the offline fall-through path may be broken."
            exit 1
          fi

      # same vuln gate as build-online, against
      # build-offline.log so a regression that only surfaces under the
      # offline transitive resolution path is also caught. See the
      # build-online step header for the full rationale.
      - name: Assert no unexpected NU1902/NU1903 vulnerability warnings (offline lane)
        run: |
          set -euo pipefail
          EXPECTED_FILE=.github/expected-vuln-warnings.txt
          if [[ ! -f "${EXPECTED_FILE}" ]]; then
            echo "::error::Vuln allow-list missing at ${EXPECTED_FILE}"
            exit 1
          fi
          if [[ ! -s build-offline.log ]]; then
            echo "::error::build-offline.log missing or empty — vuln gate cannot run."
            exit 1
          fi
          ACTUAL=$(grep -Eo "NU190[23]: Package '[^']+' [^ ]+" build-offline.log | sort -u || { rc=$?; [[ "${rc}" -eq 1 ]] || exit "${rc}"; })
          EXPECTED=$(grep -Ev '^[[:space:]]*(#|$)' "${EXPECTED_FILE}" | sort -u)
          UNEXPECTED=$(comm -23 <(echo "${ACTUAL}") <(echo "${EXPECTED}") | grep -v '^$' || { rc=$?; [[ "${rc}" -eq 1 ]] || exit "${rc}"; })
          if [[ -n "${UNEXPECTED}" ]]; then
            echo "::error::Unexpected vulnerability warning(s) on offline lane — not in ${EXPECTED_FILE}:"
            echo "${UNEXPECTED}" | sed 's/^/  - /'
            exit 1
          fi
          STALE=$(comm -13 <(echo "${ACTUAL}") <(echo "${EXPECTED}") | grep -v '^$' || { rc=$?; [[ "${rc}" -eq 1 ]] || exit "${rc}"; })
          if [[ -n "${STALE}" ]]; then
            echo "::warning::Allow-list entries no longer fire on offline lane (consider pruning):"
            echo "${STALE}" | sed 's/^/  - /'
          fi

      - name: dotnet test (Release, excludes LaunchSmoke)
        run: dotnet test Umbraco.Community.AiVisibility.slnx --configuration Release --no-build --verbosity normal --filter "Category!=LaunchSmoke"

      # launch-readiness smoke trio gate. Three integration
      # tests boot the TestSite via WebApplicationFactory<Program> and assert
      # the package's most load-bearing routes against seeded Clean.Core 7.0.5
      # content (per-page Markdown frontmatter, HTML pipeline unaltered, ETag
      # 304 revalidation). Separate step so a smoke-trio-only failure surfaces
      # distinctly from generic test regressions.
      - name: dotnet test (Release, LaunchSmoke gate only)
        run: dotnet test Umbraco.Community.AiVisibility.slnx --configuration Release --no-build --verbosity normal --filter "Category=LaunchSmoke"

  pack-gate:
    # pack-output release gate. Runs `dotnet pack` and
    # asserts the resulting .nupkg's entries match an explicit allow-list.
    # Catches the kind of MSBuild/Razor-SDK content-leakage the 2026-05-05
    # external Codex review surfaced (duplicated `content/` /
    # `contentFiles/` entries) and any future analogue.
    name: Pack output assertion (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.1'

      - name: npm ci (Backoffice TS — Vite bundle must exist before pack)
        run: npm ci
        working-directory: Umbraco.Community.AiVisibility/Client

      - name: npm run build (Backoffice TS — emits the staticwebassets bundle)
        run: npm run build
        working-directory: Umbraco.Community.AiVisibility/Client

      - name: Assert Vite bundle materialised
        run: |
          set -euo pipefail
          BUNDLE=Umbraco.Community.AiVisibility/wwwroot/App_Plugins/UmbracoCommunityAiVisibility/umbraco-community-aivisibility.js
          PKG_MANIFEST=Umbraco.Community.AiVisibility/Client/public/umbraco-package.json
          if [[ ! -f "${BUNDLE}" ]]; then
            echo "::error::Vite entry bundle missing at ${BUNDLE} after 'npm run build' (pack-gate lane). The pack will not include adopter-facing JS."
            exit 1
          fi
          if [[ ! -f "${PKG_MANIFEST}" ]]; then
            echo "::error::Umbraco package manifest missing at ${PKG_MANIFEST} (pack-gate lane)."
            exit 1
          fi
          echo "Vite bundle and Umbraco package manifest present (pack-gate lane)."

      - name: Assert pack output matches allow-list
        run: ./.github/scripts/assert-pack-output.sh

      - name: dotnet pack (artifact for PR review)
        run: dotnet pack Umbraco.Community.AiVisibility/Umbraco.Community.AiVisibility.csproj --configuration Release --output ./artifacts

      - name: Upload .nupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: Umbraco.Community.AiVisibility-nupkg
          path: ./artifacts/*.nupkg
          retention-days: 7

  link-check:
    # Markdown link-check release gate. Targets adopter-facing markdown
    # (README.md, CHANGELOG.md, docs/**.md) and fails the build on any broken
    # link. Configured via `.markdown-link-check.json` at repo root for
    # ignore-patterns of pre-launch URLs (the NuGet listing 404s until v1.0.0
    # publishes; the integration test feed URLs are documented references the
    # link-checker should not hit on every PR).
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown link check (README + CHANGELOG)
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'no'
          use-verbose-mode: 'yes'
          config-file: '.markdown-link-check.json'
          file-path: './README.md, ./CHANGELOG.md'

      - name: Markdown link check (docs/)
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'no'
          use-verbose-mode: 'yes'
          config-file: '.markdown-link-check.json'
          folder-path: 'docs'
