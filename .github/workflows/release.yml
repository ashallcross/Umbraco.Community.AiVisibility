# Release workflow — fires on v* tag push from main.
#
# Atomic by design: builds, tests, packs, asserts pack-output, pushes to
# nuget.org, then creates a GitHub Release. Partial failure (e.g. NuGet push
# succeeds, GitHub Release fails) is acceptable because nuget.org publishes
# are immutable post-validation; a manual `gh release create` follow-up
# closes the loop without re-running the pack.

name: release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_NOLOGO: '1'
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'

jobs:
  release:
    name: Build + test + pack + publish + GitHub Release
    runs-on: ubuntu-latest
    permissions:
      # softprops/action-gh-release needs `contents: write` to create the Release.
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the changelog excerpt extraction can read all
          # CHANGELOG.md content (and so a future `git describe` works).
          fetch-depth: 0

      # Tag-discipline guard: refuse to release from a non-`v*` tag, and refuse
      # to release from a tag that does not point at a commit reachable from
      # main. Defends against an accidental tag push from a feature branch.
      - name: Verify tag is on main
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF}" =~ ^refs/tags/v ]]; then
            echo "::error::release workflow requires a tag ref starting with 'v'; got ${GITHUB_REF}"
            exit 1
          fi
          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::tag ${GITHUB_REF} points at commit ${GITHUB_SHA} which is NOT reachable from origin/main."
            echo "Releases must be tagged from main HEAD. If a release branch is intentional, document the exemption in docs/release-checklist.md and bypass via a force-push override (not recommended)."
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} verified on main."

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.1'

      - name: npm ci (Backoffice TS)
        run: npm ci
        working-directory: Umbraco.Community.AiVisibility/Client

      - name: npm run build (Backoffice TS)
        run: npm run build
        working-directory: Umbraco.Community.AiVisibility/Client

      - name: Assert Vite bundle materialised
        run: |
          set -euo pipefail
          BUNDLE=Umbraco.Community.AiVisibility/wwwroot/App_Plugins/UmbracoCommunityAiVisibility/umbraco-community-aivisibility.js
          if [[ ! -f "${BUNDLE}" ]]; then
            echo "::error::Vite bundle missing at ${BUNDLE}; cannot publish."
            exit 1
          fi

      - name: dotnet restore
        run: dotnet restore Umbraco.Community.AiVisibility.slnx

      - name: dotnet build (Release)
        run: dotnet build Umbraco.Community.AiVisibility.slnx --configuration Release --no-restore

      - name: dotnet test (Release, excludes LaunchSmoke)
        run: dotnet test Umbraco.Community.AiVisibility.slnx --configuration Release --no-build --filter "Category!=LaunchSmoke"

      - name: dotnet test (Release, LaunchSmoke gate)
        run: dotnet test Umbraco.Community.AiVisibility.slnx --configuration Release --no-build --filter "Category=LaunchSmoke"

      - name: dotnet pack
        run: dotnet pack Umbraco.Community.AiVisibility/Umbraco.Community.AiVisibility.csproj --configuration Release --output ./artifacts

      - name: Assert pack output matches allow-list
        run: ./.github/scripts/assert-pack-output.sh
        env:
          PACK_OUT_DIR: ./artifacts

      - name: dotnet nuget push (with retry — 5s, 25s exponential backoff)
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${NUGET_API_KEY:-}" ]]; then
            echo "::error::NUGET_API_KEY repository secret is not provisioned."
            echo "Add it at Settings → Secrets and variables → Actions before retrying the release."
            exit 1
          fi
          for attempt in 1 2 3; do
            if dotnet nuget push artifacts/*.nupkg \
              --api-key "${NUGET_API_KEY}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate; then
              echo "NuGet push succeeded on attempt ${attempt}."
              break
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "::error::NuGet push failed after 3 attempts (delays: 0s, 5s, 25s). Permanent failure — investigate before retrying."
              exit 1
            fi
            sleep_seconds=$((5 ** attempt))  # 5, 25
            echo "::warning::NuGet push attempt ${attempt} failed; retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          done

      - name: Extract CHANGELOG excerpt for release notes
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          # Extract everything between '## [<TAG>]' and the next '## [' marker.
          # CHANGELOG entry headings are shaped: `## [v1.0.0] — <description>`.
          awk -v tag="${TAG_NAME}" '
            $0 ~ "^## \\[" tag "\\]" { in_section = 1; next }
            in_section && $0 ~ "^## \\[" { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "::warning::No CHANGELOG entry found for tag ${TAG_NAME}; release notes will reference the tag and link to the full changelog."
            printf "Release %s\n\nFull changelog: https://github.com/%s/blob/main/CHANGELOG.md\n" \
              "${TAG_NAME}" "${GITHUB_REPOSITORY}" > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          # Auto-detect prerelease from semver suffix; -rc, -beta, -alpha all flag.
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: artifacts/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
